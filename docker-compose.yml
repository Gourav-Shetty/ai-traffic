version: '3.8'

services:
  ml:
    build: ./ml_model
    container_name: traffic-ai-ml
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  app:
    build: .
    container_name: traffic-ai-app
    ports:
      - "4000:4000"
    depends_on:
      ml:
        condition: service_healthy
    environment:
      - LOCAL_ML_API_URL=http://ml:8000
      - NODE_ENV=development
    volumes:
      - ./src:/app/src
      - ./ml_model:/app/ml_model
    stdin_open: true
    tty: true
